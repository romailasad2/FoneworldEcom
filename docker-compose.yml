services:
  postgres:
    image: postgres:16
    container_name: foneworld-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: foneworld
    ports:
      - "5432:5432"
    volumes:
      - foneworld_pgdata:/var/lib/postgresql/data

volumes:
  foneworld_pgdata:
